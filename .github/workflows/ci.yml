name: chronocast-ci

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install backend and ML dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/django_api/requirements.txt -r ml_pipeline/requirements.txt
      - name: Django smoke tests
        env:
          DJANGO_SETTINGS_MODULE: core.settings
        working-directory: backend/django_api
        run: python manage.py test
      - name: Static compile check
        run: python -m compileall backend ml_pipeline

  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  model-training:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install ML dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml_pipeline/requirements.txt -r backend/django_api/requirements.txt
      - name: Prepare datasets
        run: |
          python -m ml_pipeline.data_pipeline.preprocess
          python -m ml_pipeline.data_pipeline.feature_engineering
      - name: Train models
        run: |
          python -m ml_pipeline.training.train_linear
          python -m ml_pipeline.training.train_arima
          python -m ml_pipeline.training.train_lstm --epochs 2 --batch-size 16
      - name: Generate drift summary
        run: python -m ml_pipeline.monitoring.drift_detection.generate_report

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-quality]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f backend/Dockerfile .
      - name: Build frontend image
        run: docker build -f frontend/Dockerfile .
